name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check types
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint src test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build XPI
        run: npm run build

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-translate-for-zotero-${{ github.sha }}
          path: build/*.xpi
          if-no-files-found: error
          retention-days: 14
